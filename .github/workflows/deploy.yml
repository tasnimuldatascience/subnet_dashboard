name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd subnet_dashboard
            git pull origin main
            pm2 delete subnet-dashboard 2>/dev/null || true
            rm -rf .next
            export BUILD_TIME="$(date -u +%Y%m%d%H%M%S)"
            NODE_OPTIONS='--max-old-space-size=512' npm run build
            NODE_OPTIONS='--max-old-space-size=512' pm2 start npm --name subnet-dashboard --max-memory-restart 700M -- start
            pm2 save
            echo "Deploy complete: $(date)"
          script_stop: true
          command_timeout: 10m
