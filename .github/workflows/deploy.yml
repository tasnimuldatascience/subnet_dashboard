name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  # Let an in-flight handoff finish before a newer push deploys. Canceling the
  # SSH runner can leave remote build processes and slot state out of sync.
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        timeout-minutes: 14
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 45s
          command_timeout: 12m
          script_stop: true
          script: |
            set -euo pipefail

            APP_ROOT="$HOME/subnet_dashboard"
            RELEASE_ROOT="$HOME/subnet_dashboard_releases"
            ACTIVE_SLOT_FILE="$HOME/.subnet-dashboard-active-slot"
            CLEANUP_STAMP="$(date -u +%Y%m%d%H%M%S)"
            CLEANUP_LOG="$HOME/subnet-dashboard-disk-cleanup.log"
            REQUIRED_FREE_KB=1250000

            ACTIVE_SLOT="$(cat "$ACTIVE_SLOT_FILE" 2>/dev/null || true)"
            case "$ACTIVE_SLOT" in
              .next-blue)
                CANDIDATE_SLOT=".next-green"
                ;;
              .next-green)
                CANDIDATE_SLOT=".next-blue"
                ;;
              *)
                # Existing servers created before slot deployments use `.next`.
                ACTIVE_SLOT=".next"
                CANDIDATE_SLOT=".next-blue"
                ;;
            esac

            echo "Starting bounded EC2 disk recovery"
            echo "Active build slot: $ACTIVE_SLOT; candidate build slot: $CANDIDATE_SLOT"

            # A canceled SSH action can leave its remote child alive. Stop only
            # abandoned release builds, candidate servers, and release cleanup;
            # never match the production `next start` process.
            pkill -f "$RELEASE_ROOT/release-.*/node_modules/.bin/[n]ext build" 2>/dev/null || true
            pkill -f "$RELEASE_ROOT/release-.*/node_modules/next/dist/bin/[n]ext build" 2>/dev/null || true
            pkill -f "[r]m -rf .*$RELEASE_ROOT" 2>/dev/null || true
            pm2 delete subnet-dashboard-candidate >/dev/null 2>&1 || true

            # Only the inactive slot is disposable. The active slot remains
            # untouched and continues serving production throughout the build.
            rm -rf "$APP_ROOT/$CANDIDATE_SLOT"

            # The deployment host should not retain isolated release trees.
            # Rename bulky generated directories in constant time, then delete them in
            # the background while reporting free-space progress. Future deploys
            # build in place and no longer recreate this release tree.
            cleanup_paths=()
            if [ -d "$RELEASE_ROOT" ]; then
              RELEASE_TRASH="$HOME/subnet_dashboard_releases.cleanup-$CLEANUP_STAMP"
              mv "$RELEASE_ROOT" "$RELEASE_TRASH"
              cleanup_paths+=("$RELEASE_TRASH")
            fi

            if [ -d "$APP_ROOT/.next/cache" ]; then
              NEXT_CACHE_TRASH="$HOME/subnet_dashboard-next-cache.cleanup-$CLEANUP_STAMP"
              mv "$APP_ROOT/.next/cache" "$NEXT_CACHE_TRASH"
              cleanup_paths+=("$NEXT_CACHE_TRASH")
            fi

            NPM_CACHE="$(npm config get cache)"
            if [ -d "$NPM_CACHE" ]; then
              NPM_CACHE_TRASH="$HOME/subnet_dashboard-npm-cache.cleanup-$CLEANUP_STAMP"
              mv "$NPM_CACHE" "$NPM_CACHE_TRASH"
              cleanup_paths+=("$NPM_CACHE_TRASH")
            fi

            cleanup_pid=""
            if [ "${#cleanup_paths[@]}" -gt 0 ]; then
              nohup rm -rf -- "${cleanup_paths[@]}" >"$CLEANUP_LOG" 2>&1 </dev/null &
              cleanup_pid="$!"
              echo "Background cleanup started as PID $cleanup_pid"
            fi

            disk_ready=false
            for attempt in $(seq 1 120); do
              available_kb="$(df -Pk "$HOME" | awk 'NR == 2 { print $4 }')"
              echo "Disk recovery $attempt/120: ${available_kb} KB available"
              if [ "$available_kb" -ge "$REQUIRED_FREE_KB" ]; then
                disk_ready=true
                break
              fi
              if [ -n "$cleanup_pid" ] && ! kill -0 "$cleanup_pid" 2>/dev/null; then
                echo "Background cleanup ended before enough space was recovered"
                break
              fi
              sleep 5
            done

            if [ "$disk_ready" != true ]; then
              echo "EC2 still has insufficient disk space"
              df -h "$HOME"
              tail -n 50 "$CLEANUP_LOG" 2>/dev/null || true
              exit 1
            fi

            df -h "$HOME"
            cd "$APP_ROOT"
            git fetch origin main
            git checkout main
            git merge --ff-only origin/main
            echo "Deploying commit: $(git rev-parse --short HEAD)"

            # Keep one dependency tree, but build into the inactive slot. This
            # avoids the duplicated node_modules trees that previously filled EC2
            # without overwriting the build currently serving production.
            npm install --no-audit --no-fund
            export BUILD_TIME="$(date -u +%Y%m%d%H%M%S)"
            NEXT_DIST_DIR="$CANDIDATE_SLOT" NODE_OPTIONS='--max-old-space-size=768' npm run build

            # The build cache is not needed at runtime. Removing it keeps the two
            # deploy slots small enough for the existing EC2 volume.
            rm -rf "$APP_ROOT/$CANDIDATE_SLOT/cache"

            # Old and new workers overlap briefly during a rolling reload. Merge
            # their hashed browser assets so either worker can satisfy requests
            # for a page generated by the other version during that handoff.
            if [ -d "$APP_ROOT/$ACTIVE_SLOT/static" ]; then
              cp -a "$APP_ROOT/$ACTIVE_SLOT/static/." "$APP_ROOT/$CANDIDATE_SLOT/static/"
              cp -a "$APP_ROOT/$CANDIDATE_SLOT/static/." "$APP_ROOT/$ACTIVE_SLOT/static/"
            fi

            # Prove the new build can boot before changing the production worker.
            NEXT_DIST_DIR="$CANDIDATE_SLOT" pm2 start "$APP_ROOT/node_modules/next/dist/bin/next" \
              --name subnet-dashboard-candidate \
              --cwd "$APP_ROOT" \
              --interpreter node \
              --no-autorestart \
              -- start -p 3001

            candidate_healthy=false
            for attempt in $(seq 1 30); do
              if curl --fail --silent --show-error http://127.0.0.1:3001/icon-64.png > /dev/null; then
                candidate_healthy=true
                break
              fi
              sleep 2
            done

            if [ "$candidate_healthy" != true ]; then
              echo "Candidate failed to become healthy; production was not changed"
              pm2 logs subnet-dashboard-candidate --lines 100 --nostream
              pm2 delete subnet-dashboard-candidate >/dev/null 2>&1 || true
              exit 1
            fi

            pm2 delete subnet-dashboard-candidate >/dev/null 2>&1 || true

            # The process was migrated to this committed cluster definition by
            # commit 7f468eb. A cluster reload starts the replacement worker before
            # retiring the old worker, keeping port 3000 continuously available.
            NEXT_DIST_DIR="$CANDIDATE_SLOT" pm2 startOrReload "$APP_ROOT/ecosystem.config.cjs" --update-env

            production_healthy=false
            for attempt in $(seq 1 30); do
              if curl --fail --silent --show-error http://127.0.0.1:3000/icon-64.png > /dev/null; then
                production_healthy=true
                break
              fi
              sleep 2
            done

            if [ "$production_healthy" != true ]; then
              echo "Production health check failed after PM2 reload; restoring $ACTIVE_SLOT"
              pm2 status
              pm2 logs subnet-dashboard --lines 100 --nostream
              NEXT_DIST_DIR="$ACTIVE_SLOT" pm2 startOrReload "$APP_ROOT/ecosystem.config.cjs" --update-env || true
              exit 1
            fi

            # Record the slot only after the production health check succeeds.
            printf '%s\n' "$CANDIDATE_SLOT" > "$ACTIVE_SLOT_FILE.tmp"
            mv "$ACTIVE_SLOT_FILE.tmp" "$ACTIVE_SLOT_FILE"

            # Once both managed slots have been used, the legacy `.next` build is
            # no longer needed. Keep the immediately previous managed slot intact
            # until the next successful deployment for quick rollback.
            if [ "$ACTIVE_SLOT" != ".next" ]; then
              rm -rf "$APP_ROOT/.next"
            fi

            pm2 save
            echo "Deploy complete: $(date)"
