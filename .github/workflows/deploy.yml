name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  # Let an in-flight handoff finish before a newer push deploys. Canceling the
  # SSH runner can leave remote build processes and slot state out of sync.
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Stop abandoned legacy EC2 build
        uses: appleboy/ssh-action@v1.2.0
        timeout-minutes: 3
        env:
          RESEARCH_LAB_ALERT_MONITOR_ENABLED: "true"
          RESEARCH_LAB_ALERT_MONITOR_INTERVAL_MS: "60000"
          RESEARCH_LAB_ALERT_SIGNALS: pcr0_mismatch,pcr0_missing,pcr0_stale,offchain_weight_bundle_missing,offchain_weight_bundle_stale,benchmark_failed,benchmark_stalled,active_run_stale,active_run_blocked,transparency_checkpoint_stale,maintenance_pause_overrun
          OPS_MONITORED_VALIDATOR_HOTKEYS: 5FNVgRnrxMibhcBGEAaajGrYjsaCn441a5HuGUBUNnxEBLo9
          RESEARCH_LAB_ALERT_DASHBOARD_URL: https://subnet71.com/admin
          RESEARCH_LAB_ALERT_MINIMUM_SEVERITY: warning
          RESEARCH_LAB_ALERT_TIMEOUT_MS: "10000"
          RESEARCH_LAB_ALERT_DISCORD_USERNAME: Leadpoet Bug Watch
          RESEARCH_LAB_EVENT_MONITOR_ENABLED: "true"
          RESEARCH_LAB_EVENT_MONITOR_INTERVAL_MS: "60000"
          RESEARCH_LAB_IMPROVEMENT_DISCORD_USERNAME: Leadpoet Lab Watch
          RESEARCH_LAB_IMPROVEMENT_ANALYSIS_TIMEOUT_MS: "600000"
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 45s
          command_timeout: 2m
          envs: RESEARCH_LAB_ALERT_MONITOR_ENABLED,RESEARCH_LAB_ALERT_MONITOR_INTERVAL_MS,RESEARCH_LAB_ALERT_SIGNALS,OPS_MONITORED_VALIDATOR_HOTKEYS,RESEARCH_LAB_ALERT_DASHBOARD_URL,RESEARCH_LAB_ALERT_MINIMUM_SEVERITY,RESEARCH_LAB_ALERT_TIMEOUT_MS,RESEARCH_LAB_ALERT_DISCORD_USERNAME,RESEARCH_LAB_EVENT_MONITOR_ENABLED,RESEARCH_LAB_EVENT_MONITOR_INTERVAL_MS,RESEARCH_LAB_IMPROVEMENT_DISCORD_USERNAME,RESEARCH_LAB_IMPROVEMENT_ANALYSIS_TIMEOUT_MS
          script: |
            set -euo pipefail

            APP_ROOT="$HOME/subnet_dashboard"
            ACTIVE_SLOT_FILE="$HOME/.subnet-dashboard-active-slot"
            legacy_build_stopped=false

            if pkill -f "$APP_ROOT/node_modules/.bin/[n]ext build" 2>/dev/null; then
              legacy_build_stopped=true
            fi
            if pkill -f "$APP_ROOT/node_modules/next/dist/bin/[n]ext build" 2>/dev/null; then
              legacy_build_stopped=true
            fi

            if [ "$legacy_build_stopped" = true ]; then
              echo "Stopped an abandoned on-instance Next.js build"
              pm2 delete subnet-dashboard-candidate >/dev/null 2>&1 || true
              ACTIVE_SLOT="$(cat "$ACTIVE_SLOT_FILE" 2>/dev/null || printf '.next')"
              NEXT_DIST_DIR="$ACTIVE_SLOT" pm2 startOrReload "$APP_ROOT/ecosystem.config.cjs"

              production_healthy=false
              for attempt in $(seq 1 20); do
                if curl --fail --silent --show-error --max-time 10 http://127.0.0.1:3000/icon-64.png > /dev/null; then
                  production_healthy=true
                  break
                fi
                sleep 2
              done

              if [ "$production_healthy" != true ]; then
                echo "Production did not recover after stopping the abandoned build"
                pm2 status
                pm2 logs subnet-dashboard --lines 100 --nostream
                exit 1
              fi
            fi

      - name: Check out release source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install build dependencies
        run: npm ci --no-audit --no-fund

      - name: Build production artifact
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NODE_OPTIONS: --max-old-space-size=4096
        run: |
          set -euo pipefail
          BUILD_DIR=".deploy-build-${GITHUB_SHA}"
          NEXT_DIST_DIR="$BUILD_DIR" BUILD_TIME="$GITHUB_SHA" npm run build
          rm -rf "$BUILD_DIR/cache"
          tar -czf "deploy-build-${GITHUB_SHA}.tgz" "$BUILD_DIR"

      - name: Copy production artifact to EC2
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 45s
          command_timeout: 5m
          source: deploy-build-${{ github.sha }}.tgz
          target: /home/ec2-user
          overwrite: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        timeout-minutes: 12
        env:
          RESEARCH_LAB_ALERT_MONITOR_ENABLED: "true"
          RESEARCH_LAB_ALERT_MONITOR_INTERVAL_MS: "60000"
          RESEARCH_LAB_ALERT_SIGNALS: pcr0_mismatch,pcr0_missing,pcr0_stale,offchain_weight_bundle_missing,offchain_weight_bundle_stale,benchmark_failed,benchmark_stalled,active_run_stale,active_run_blocked,transparency_checkpoint_stale,maintenance_pause_overrun
          OPS_MONITORED_VALIDATOR_HOTKEYS: 5FNVgRnrxMibhcBGEAaajGrYjsaCn441a5HuGUBUNnxEBLo9
          RESEARCH_LAB_ALERT_DASHBOARD_URL: https://subnet71.com/admin
          RESEARCH_LAB_ALERT_MINIMUM_SEVERITY: warning
          RESEARCH_LAB_ALERT_TIMEOUT_MS: "10000"
          RESEARCH_LAB_ALERT_DISCORD_USERNAME: Leadpoet Bug Watch
          RESEARCH_LAB_EVENT_MONITOR_ENABLED: "true"
          RESEARCH_LAB_EVENT_MONITOR_INTERVAL_MS: "60000"
          RESEARCH_LAB_IMPROVEMENT_DISCORD_USERNAME: Leadpoet Lab Watch
          RESEARCH_LAB_IMPROVEMENT_ANALYSIS_TIMEOUT_MS: "600000"
          AWS_REGION: us-east-1
          AWS_DEFAULT_REGION: us-east-1
          SUBNET_DASHBOARD_SECRET_ID: leadpoet/prod/subnet-dashboard/env
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 45s
          command_timeout: 12m
          envs: RESEARCH_LAB_ALERT_MONITOR_ENABLED,RESEARCH_LAB_ALERT_MONITOR_INTERVAL_MS,RESEARCH_LAB_ALERT_SIGNALS,OPS_MONITORED_VALIDATOR_HOTKEYS,RESEARCH_LAB_ALERT_DASHBOARD_URL,RESEARCH_LAB_ALERT_MINIMUM_SEVERITY,RESEARCH_LAB_ALERT_TIMEOUT_MS,RESEARCH_LAB_ALERT_DISCORD_USERNAME,RESEARCH_LAB_EVENT_MONITOR_ENABLED,RESEARCH_LAB_EVENT_MONITOR_INTERVAL_MS,RESEARCH_LAB_IMPROVEMENT_DISCORD_USERNAME,RESEARCH_LAB_IMPROVEMENT_ANALYSIS_TIMEOUT_MS,AWS_REGION,AWS_DEFAULT_REGION,SUBNET_DASHBOARD_SECRET_ID,NEXT_PUBLIC_SUPABASE_URL
          script: |
            set -euo pipefail

            APP_ROOT="$HOME/subnet_dashboard"
            RELEASE_ROOT="$HOME/subnet_dashboard_releases"
            ACTIVE_SLOT_FILE="$HOME/.subnet-dashboard-active-slot"
            DEPLOY_SHA="${{ github.sha }}"
            ARTIFACT="$HOME/deploy-build-$DEPLOY_SHA.tgz"
            STAGED_BUILD="$APP_ROOT/.deploy-build-$DEPLOY_SHA"
            CLEANUP_STAMP="$(date -u +%Y%m%d%H%M%S)"
            CLEANUP_LOG="$HOME/subnet-dashboard-disk-cleanup.log"
            REQUIRED_FREE_KB=1250000

            ACTIVE_SLOT="$(cat "$ACTIVE_SLOT_FILE" 2>/dev/null || true)"
            if [ "$ACTIVE_SLOT" = ".next-blue" ]; then
              CANDIDATE_SLOT=".next-green"
            elif [ "$ACTIVE_SLOT" = ".next-green" ]; then
              CANDIDATE_SLOT=".next-blue"
            else
              # Existing servers created before slot deployments use `.next`.
              ACTIVE_SLOT=".next"
              CANDIDATE_SLOT=".next-blue"
            fi

            # A previous deployment may have passed HTTP health and then failed
            # its monitor verification before recording the slot. Trust the
            # running PM2 process over a stale pointer so we never delete the
            # build currently serving production.
            RUNNING_SLOT="$(pm2 jlist 2>/dev/null | node -e '
              let input = "";
              process.stdin.setEncoding("utf8");
              process.stdin.on("data", (chunk) => { input += chunk; });
              process.stdin.on("end", () => {
                try {
                  const app = JSON.parse(input).find((item) => item.name === "subnet-dashboard");
                  process.stdout.write(app?.pm2_env?.NEXT_DIST_DIR ?? "");
                } catch {}
              });
            ' || true)"
            if [ "$RUNNING_SLOT" = ".next" ] || [ "$RUNNING_SLOT" = ".next-blue" ] || [ "$RUNNING_SLOT" = ".next-green" ]; then
              if [ "$RUNNING_SLOT" != "$ACTIVE_SLOT" ]; then
                echo "Correcting stale slot pointer: $ACTIVE_SLOT -> $RUNNING_SLOT"
                ACTIVE_SLOT="$RUNNING_SLOT"
                if [ "$ACTIVE_SLOT" = ".next-blue" ]; then
                  CANDIDATE_SLOT=".next-green"
                else
                  CANDIDATE_SLOT=".next-blue"
                fi
              fi
            fi

            echo "Starting bounded EC2 disk recovery"
            echo "Active build slot: $ACTIVE_SLOT; candidate build slot: $CANDIDATE_SLOT"

            if [ ! -f "$ARTIFACT" ]; then
              echo "The prebuilt release artifact is missing: $ARTIFACT"
              exit 1
            fi

            # A canceled SSH action can leave its remote child alive. Stop only
            # abandoned legacy build commands, candidate servers, and release
            # cleanup; never match the production `next start` process.
            pkill -f "$RELEASE_ROOT/release-.*/node_modules/.bin/[n]ext build" 2>/dev/null || true
            pkill -f "$RELEASE_ROOT/release-.*/node_modules/next/dist/bin/[n]ext build" 2>/dev/null || true
            pkill -f "$APP_ROOT/node_modules/.bin/[n]ext build" 2>/dev/null || true
            pkill -f "$APP_ROOT/node_modules/next/dist/bin/[n]ext build" 2>/dev/null || true
            pkill -f "[r]m -rf .*$RELEASE_ROOT" 2>/dev/null || true
            pm2 delete subnet-dashboard-candidate >/dev/null 2>&1 || true

            # Only the inactive slot is disposable. The active slot remains
            # untouched and continues serving production throughout the build.
            rm -rf "$APP_ROOT/$CANDIDATE_SLOT"

            # The deployment host should not retain isolated release trees.
            # Rename bulky generated directories in constant time, then delete them in
            # the background while reporting free-space progress. Future deploys
            # build in place and no longer recreate this release tree.
            cleanup_paths=()
            if [ -d "$RELEASE_ROOT" ]; then
              RELEASE_TRASH="$HOME/subnet_dashboard_releases.cleanup-$CLEANUP_STAMP"
              mv "$RELEASE_ROOT" "$RELEASE_TRASH"
              cleanup_paths+=("$RELEASE_TRASH")
            fi

            if [ -d "$APP_ROOT/.next/cache" ]; then
              NEXT_CACHE_TRASH="$HOME/subnet_dashboard-next-cache.cleanup-$CLEANUP_STAMP"
              mv "$APP_ROOT/.next/cache" "$NEXT_CACHE_TRASH"
              cleanup_paths+=("$NEXT_CACHE_TRASH")
            fi

            NPM_CACHE="$(npm config get cache)"
            if [ -d "$NPM_CACHE" ]; then
              NPM_CACHE_TRASH="$HOME/subnet_dashboard-npm-cache.cleanup-$CLEANUP_STAMP"
              mv "$NPM_CACHE" "$NPM_CACHE_TRASH"
              cleanup_paths+=("$NPM_CACHE_TRASH")
            fi

            cleanup_pid=""
            if [ "${#cleanup_paths[@]}" -gt 0 ]; then
              nohup rm -rf -- "${cleanup_paths[@]}" >"$CLEANUP_LOG" 2>&1 </dev/null &
              cleanup_pid="$!"
              echo "Background cleanup started as PID $cleanup_pid"
            fi

            disk_ready=false
            for attempt in $(seq 1 120); do
              available_kb="$(df -Pk "$HOME" | awk 'NR == 2 { print $4 }')"
              echo "Disk recovery $attempt/120: ${available_kb} KB available"
              if [ "$available_kb" -ge "$REQUIRED_FREE_KB" ]; then
                disk_ready=true
                break
              fi
              if [ -n "$cleanup_pid" ] && ! kill -0 "$cleanup_pid" 2>/dev/null; then
                echo "Background cleanup ended before enough space was recovered"
                break
              fi
              sleep 5
            done

            if [ "$disk_ready" != true ]; then
              echo "EC2 still has insufficient disk space"
              df -h "$HOME"
              tail -n 50 "$CLEANUP_LOG" 2>/dev/null || true
              exit 1
            fi

            df -h "$HOME"
            cd "$APP_ROOT"
            git fetch origin main
            git checkout main
            git merge --ff-only origin/main
            echo "Deploying commit: $(git rev-parse --short HEAD)"

            if [ "$(git rev-parse HEAD)" != "$DEPLOY_SHA" ]; then
              echo "Checked-out commit does not match the prebuilt release artifact"
              exit 1
            fi

            # Apply the current process policy before switching releases. This
            # also repairs a worker still cycling under an older, overly-low PM2
            # memory threshold.
            NEXT_DIST_DIR="$ACTIVE_SLOT" pm2 startOrReload "$APP_ROOT/ecosystem.config.cjs"

            active_healthy=false
            for attempt in $(seq 1 15); do
              if curl --fail --silent --show-error --max-time 10 http://127.0.0.1:3000/icon-64.png > /dev/null; then
                active_healthy=true
                break
              fi
              sleep 2
            done

            if [ "$active_healthy" != true ]; then
              echo "Existing production slot failed to stabilize before build"
              pm2 status
              pm2 logs subnet-dashboard --lines 100 --nostream
              exit 1
            fi

            # Runtime dependencies remain on EC2, but compilation happened on the
            # GitHub runner so it cannot starve the live production worker.
            npm ci --omit=dev --no-audit --no-fund

            rm -rf "$STAGED_BUILD"
            tar -xzf "$ARTIFACT" -C "$APP_ROOT"
            rm -f "$ARTIFACT"

            if [ ! -f "$STAGED_BUILD/BUILD_ID" ]; then
              echo "The extracted release artifact does not contain a Next.js BUILD_ID"
              exit 1
            fi

            mv "$STAGED_BUILD" "$APP_ROOT/$CANDIDATE_SLOT"

            # Old and new workers overlap briefly during a rolling reload. Merge
            # their hashed browser assets so either worker can satisfy requests
            # for a page generated by the other version during that handoff.
            if [ -d "$APP_ROOT/$ACTIVE_SLOT/static" ]; then
              cp -a "$APP_ROOT/$ACTIVE_SLOT/static/." "$APP_ROOT/$CANDIDATE_SLOT/static/"
              cp -a "$APP_ROOT/$CANDIDATE_SLOT/static/." "$APP_ROOT/$ACTIVE_SLOT/static/"
            fi

            # Prove the new build can boot before changing the production worker.
            RESEARCH_LAB_ALERT_MONITOR_ENABLED=false RESEARCH_LAB_EVENT_MONITOR_ENABLED=false NEXT_DIST_DIR="$CANDIDATE_SLOT" \
              pm2 start "$APP_ROOT/scripts/start-production.mjs" \
              --name subnet-dashboard-candidate \
              --cwd "$APP_ROOT" \
              --interpreter node \
              --no-autorestart \
              -- start -p 3001

            candidate_healthy=false
            for attempt in $(seq 1 30); do
              if curl --fail --silent --show-error --max-time 10 http://127.0.0.1:3001/api/health/ready > /dev/null; then
                candidate_healthy=true
                break
              fi
              sleep 2
            done

            if [ "$candidate_healthy" != true ]; then
              echo "Candidate failed to become healthy; production was not changed"
              pm2 logs subnet-dashboard-candidate --lines 100 --nostream
              pm2 delete subnet-dashboard-candidate >/dev/null 2>&1 || true
              exit 1
            fi

            pm2 delete subnet-dashboard-candidate >/dev/null 2>&1 || true

            # The process was migrated to this committed cluster definition by
            # commit 7f468eb. A cluster reload starts the replacement worker before
            # retiring the old worker, keeping port 3000 continuously available.
            MONITOR_VERIFY_AFTER="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            NEXT_DIST_DIR="$CANDIDATE_SLOT" pm2 startOrReload "$APP_ROOT/ecosystem.config.cjs" --update-env

            production_healthy=false
            # Cache warmup (metagraph fetch + dashboard transforms) can hold the
            # reloaded worker past the old 60s budget; give it 4 minutes before
            # declaring failure and rolling back.
            for attempt in $(seq 1 120); do
              if curl --fail --silent --show-error --max-time 10 http://127.0.0.1:3000/api/health/ready > /dev/null; then
                production_healthy=true
                break
              fi
              sleep 2
            done

            if [ "$production_healthy" != true ]; then
              echo "Production health check failed after PM2 reload; restoring $ACTIVE_SLOT"
              pm2 status
              pm2 logs subnet-dashboard --lines 100 --nostream
              NEXT_DIST_DIR="$ACTIVE_SLOT" pm2 startOrReload "$APP_ROOT/ecosystem.config.cjs" --update-env || true
              exit 1
            fi

            # A single successful request is not enough: the previous 700 MB
            # watchdog failure appeared about 30 seconds after boot. Require the
            # same production PID to remain healthy beyond that interval.
            production_pid="$(pm2 pid subnet-dashboard)"
            production_stable=true
            for attempt in $(seq 1 15); do
              sleep 3
              current_pid="$(pm2 pid subnet-dashboard)"
              if [ -z "$current_pid" ] || [ "$current_pid" != "$production_pid" ] || \
                ! curl --fail --silent --show-error --max-time 10 http://127.0.0.1:3000/api/health/ready > /dev/null; then
                production_stable=false
                break
              fi
            done

            if [ "$production_stable" != true ]; then
              echo "Production worker restarted or became unhealthy during the stability window"
              pm2 status
              pm2 logs subnet-dashboard --lines 100 --nostream
              NEXT_DIST_DIR="$ACTIVE_SLOT" pm2 startOrReload "$APP_ROOT/ecosystem.config.cjs" --update-env || true
              exit 1
            fi

            # A healthy HTTP response does not prove the background schedulers
            # started. Read the secret only inside this verification subshell,
            # then require both durable monitor leases to be claimed by the new
            # worker. Values never enter PM2's managed environment.
            umask 077
            RUNTIME_SECRET_FILE="$(mktemp "$HOME/.subnet-dashboard-runtime-secret.XXXXXX")"
            cleanup_runtime_secret_file() {
              rm -f "$RUNTIME_SECRET_FILE"
            }
            trap cleanup_runtime_secret_file EXIT
            monitor_verified=true
            if ! node "$APP_ROOT/scripts/load-runtime-secret.mjs" > "$RUNTIME_SECRET_FILE"; then
              monitor_verified=false
            elif ! (
              set -a
              . "$RUNTIME_SECRET_FILE"
              set +a
              VERIFY_MONITOR_AFTER="$MONITOR_VERIFY_AFTER" \
                node "$APP_ROOT/scripts/verify-runtime-monitors.mjs"
            ); then
              monitor_verified=false
            fi
            cleanup_runtime_secret_file
            trap - EXIT

            if [ "$monitor_verified" != true ]; then
              echo "Runtime monitor verification failed; restoring $ACTIVE_SLOT"
              NEXT_DIST_DIR="$ACTIVE_SLOT" pm2 startOrReload "$APP_ROOT/ecosystem.config.cjs" --update-env || true
              exit 1
            fi

            # Record the slot only after the production health check succeeds.
            printf '%s\n' "$CANDIDATE_SLOT" > "$ACTIVE_SLOT_FILE.tmp"
            mv "$ACTIVE_SLOT_FILE.tmp" "$ACTIVE_SLOT_FILE"

            # Once both managed slots have been used, the legacy `.next` build is
            # no longer needed. Keep the immediately previous managed slot intact
            # until the next successful deployment for quick rollback.
            if [ "$ACTIVE_SLOT" != ".next" ]; then
              rm -rf "$APP_ROOT/.next"
            fi

            pm2 save
            echo "Deploy complete: $(date)"

      - name: Verify public production path
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --retry 6 --retry-all-errors \
            --retry-delay 5 --connect-timeout 5 --max-time 15 \
            https://subnet71.com/api/health/ready > /dev/null
          curl --fail --silent --show-error --connect-timeout 5 --max-time 20 \
            https://subnet71.com/ > /dev/null
