name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  # A GitHub runner startup failure can otherwise leave a newer production
  # deploy pending behind a stale run. Always prefer the latest main commit.
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd subnet_dashboard
            git pull origin main
            export BUILD_TIME="$(date -u +%Y%m%d%H%M%S)"
            NODE_OPTIONS='--max-old-space-size=768' npm run build
            NODE_OPTIONS='--max-old-space-size=512' pm2 restart subnet-dashboard --update-env || NODE_OPTIONS='--max-old-space-size=512' pm2 start npm --name subnet-dashboard --max-memory-restart 700M -- start
            pm2 save
            echo "Deploy complete: $(date)"
          script_stop: true
          command_timeout: 10m
