name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  # A GitHub runner startup failure can otherwise leave a newer production
  # deploy pending behind a stale run. Always prefer the latest main commit.
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail

            APP_ROOT="$HOME/subnet_dashboard"
            RELEASE_ROOT="$HOME/subnet_dashboard_releases"
            SHARED_STATIC="$RELEASE_ROOT/shared-next-static"
            CANDIDATE_NAME="subnet-dashboard-candidate"

            cd "$APP_ROOT"
            git fetch origin main
            git checkout main
            git merge --ff-only origin/main
            DEPLOY_SHA="$(git rev-parse HEAD)"
            RELEASE_DIR="$RELEASE_ROOT/release-${DEPLOY_SHA}-$(date -u +%Y%m%d%H%M%S)"

            echo "Preparing commit: ${DEPLOY_SHA:0:7}"
            mkdir -p "$RELEASE_DIR" "$SHARED_STATIC"
            git archive "$DEPLOY_SHA" | tar -x -C "$RELEASE_DIR"

            # Production secrets live outside Git. Make the same files available
            # to the isolated release without copying their contents.
            for env_name in .env .env.local .env.production .env.production.local; do
              if [ -f "$APP_ROOT/$env_name" ]; then
                ln -s "$APP_ROOT/$env_name" "$RELEASE_DIR/$env_name"
              fi
            done

            cd "$RELEASE_DIR"
            npm ci --no-audit --no-fund
            export BUILD_TIME="$(date -u +%Y%m%d%H%M%S)"
            NODE_OPTIONS='--max-old-space-size=768' npm run build

            # During a rolling reload, old and new workers briefly coexist. Keep
            # their hashed Next.js assets in one shared directory so either worker
            # can serve a page generated by the other version.
            if [ -d "$APP_ROOT/.next/static" ]; then
              cp -a "$APP_ROOT/.next/static/." "$SHARED_STATIC/"
            fi
            cp -a "$RELEASE_DIR/.next/static/." "$SHARED_STATIC/"
            if [ -d "$APP_ROOT/.next/static" ] && [ ! -L "$APP_ROOT/.next/static" ]; then
              cp -a "$SHARED_STATIC/." "$APP_ROOT/.next/static/"
            fi
            rm -rf "$RELEASE_DIR/.next/static"
            ln -s "$SHARED_STATIC" "$RELEASE_DIR/.next/static"

            # Boot the candidate on a private port first. A failed build or boot
            # never disturbs the production process listening on port 3000.
            pm2 delete "$CANDIDATE_NAME" >/dev/null 2>&1 || true
            pm2 start "$RELEASE_DIR/node_modules/next/dist/bin/next" \
              --name "$CANDIDATE_NAME" \
              --cwd "$RELEASE_DIR" \
              --interpreter node \
              --no-autorestart \
              -- start -p 3001

            candidate_healthy=false
            for attempt in $(seq 1 30); do
              if curl --fail --silent --show-error http://127.0.0.1:3001/icon-64.png > /dev/null; then
                candidate_healthy=true
                break
              fi
              sleep 2
            done

            if [ "$candidate_healthy" != true ]; then
              echo "Candidate failed to become healthy; production was not changed"
              pm2 logs "$CANDIDATE_NAME" --lines 100 --nostream
              pm2 delete "$CANDIDATE_NAME" >/dev/null 2>&1 || true
              exit 1
            fi

            pm2 delete "$CANDIDATE_NAME"

            # Once production is managed in cluster mode, PM2 starts the
            # replacement worker before retiring the old one. The first run of
            # this workflow also performs the one-time fork-to-cluster migration.
            pm2 startOrReload "$RELEASE_DIR/ecosystem.config.cjs" --update-env

            production_healthy=false
            for attempt in $(seq 1 15); do
              if curl --fail --silent --show-error http://127.0.0.1:3000/icon-64.png > /dev/null; then
                production_healthy=true
                break
              fi
              sleep 2
            done

            if [ "$production_healthy" != true ]; then
              echo "Production health check failed after reload"
              pm2 status
              pm2 logs subnet-dashboard --lines 100 --nostream
              exit 1
            fi

            ln -sfn "$RELEASE_DIR" "$RELEASE_ROOT/current"
            pm2 save

            # Keep the five newest releases for inspection or manual rollback.
            ls -1dt "$RELEASE_ROOT"/release-* 2>/dev/null | tail -n +6 | xargs -r rm -rf

            echo "Deploy complete: $(date)"
          script_stop: true
          command_timeout: 10m
