name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  # A GitHub runner startup failure can otherwise leave a newer production
  # deploy pending behind a stale run. Always prefer the latest main commit.
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail
            cd subnet_dashboard
            git fetch origin main
            git checkout main
            git merge --ff-only origin/main
            echo "Deploying commit: $(git rev-parse --short HEAD)"
            export BUILD_TIME="$(date -u +%Y%m%d%H%M%S)"
            NODE_OPTIONS='--max-old-space-size=768' npm run build
            pm2 delete subnet-dashboard || true
            NODE_OPTIONS='--max-old-space-size=512' pm2 start npm --name subnet-dashboard --cwd "$PWD" --max-memory-restart 700M -- start

            for attempt in $(seq 1 30); do
              if curl --fail --silent --show-error http://127.0.0.1:3000/icon-64.png > /dev/null; then
                echo "Application health check passed"
                break
              fi
              if [ "$attempt" -eq 30 ]; then
                echo "Application failed to become healthy"
                pm2 status
                pm2 logs subnet-dashboard --lines 100 --nostream
                exit 1
              fi
              sleep 2
            done

            pm2 save
            echo "Deploy complete: $(date)"
          script_stop: true
          command_timeout: 10m
