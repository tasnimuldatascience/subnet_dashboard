name: Test sourcing-model read access

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-sourcing-model-read-access
  cancel-in-progress: false

jobs:
  test-read-access:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out test script
        uses: actions/checkout@v4

      - name: Copy test script to EC2
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 45s
          command_timeout: 2m
          source: scripts/test-sourcing-model-github-access.mjs
          target: /tmp/sourcing-model-read-test-${{ github.run_id }}
          strip_components: 1

      - name: Test production read access
        uses: appleboy/ssh-action@v1.2.0
        timeout-minutes: 3
        env:
          AWS_REGION: us-east-1
          AWS_DEFAULT_REGION: us-east-1
          SUBNET_DASHBOARD_SECRET_ID: leadpoet/prod/subnet-dashboard/env
          SUBNET_DASHBOARD_APP_ROOT: /home/ec2-user/subnet_dashboard
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 45s
          command_timeout: 2m
          envs: AWS_REGION,AWS_DEFAULT_REGION,SUBNET_DASHBOARD_SECRET_ID,SUBNET_DASHBOARD_APP_ROOT
          script: |
            set -euo pipefail
            TEST_ROOT="/tmp/sourcing-model-read-test-${{ github.run_id }}"
            cleanup() {
              rm -rf -- "$TEST_ROOT"
            }
            trap cleanup EXIT

            cd "$SUBNET_DASHBOARD_APP_ROOT"
            node "$TEST_ROOT/test-sourcing-model-github-access.mjs"
